<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Recap Studio</title>
<style>
:root{
  --bg:#0d0e12; --panel:#15171e; --panel2:#1b1e27; --line:#282c38;
  --text:#e6e8ef; --muted:#8b90a0; --accent:#5b8cff; --accent2:#7c5cff;
  --green:#39c07f; --red:#ef5f6b; --amber:#e5a13a; --track:#101219;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font:13px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow-x:auto;overflow-y:hidden}
/* pro-tool minimum: never collapse the player — scroll the whole app instead */
::-webkit-scrollbar{height:10px;width:10px}
::-webkit-scrollbar-thumb{background:#2c3040;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
button{font:inherit;cursor:pointer;color:var(--text);background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:6px 10px}
button:hover{border-color:var(--accent)}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.ghost{background:transparent}
.muted{color:var(--muted)} .hint{color:var(--muted);font-size:11px}
/* ---- shell grid ---- */
#app{display:grid;height:100vh;min-width:1060px;
  grid-template-columns:66px minmax(360px,1fr) 322px;
  grid-template-rows:auto 50px 1fr 210px;
  grid-template-areas:"banner banner banner" "head head head" "rail center right" "rail timeline timeline";}
#health-warn-banner{grid-area:banner;display:none}
#head{grid-area:head;display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--line)}
#head>*{flex-shrink:0}
#head .logo{font-weight:700;letter-spacing:.3px}
#head #counts{min-width:0;overflow:hidden}
#head .spacer{flex:1 1 auto;min-width:8px}
#counts{display:flex;gap:10px;align-items:center;font-size:12px}
#counts b{font-variant-numeric:tabular-nums}
.pill{display:inline-flex;gap:5px;align-items:center;padding:3px 8px;border-radius:20px;background:var(--panel2);border:1px solid var(--line)}
.dot{width:8px;height:8px;border-radius:50%}
.dot.approved{background:var(--green)} .dot.rejected{background:var(--red)} .dot.pending{background:var(--muted)}
/* ---- left rail ---- */
#rail{grid-area:rail;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:12px}
.navbtn{width:52px;height:56px;border:0;background:transparent;border-radius:9px;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;color:var(--muted);font-size:10px}
.navbtn .ic{font-size:19px;line-height:1}
.navbtn:hover{background:var(--panel2);color:var(--text)}
.navbtn.active{background:var(--panel2);color:var(--accent)}
/* ---- center ---- */
#center{grid-area:center;display:flex;flex-direction:column;background:#07080b;min-width:0}
#stageWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:14px;min-height:0}
#pvframe{width:100%;height:100%;border:0;border-radius:10px;background:#000;box-shadow:0 10px 40px rgba(0,0,0,.5)}
/* ---- right ---- */
#right{grid-area:right;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:14px}
#right h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
.insp-img{width:100%;border-radius:8px;border:1px solid var(--line);background:#000;display:block;margin-bottom:8px;max-height:190px;object-fit:contain}
.row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.field{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--text);padding:8px;resize:vertical;font:inherit}
.seg-btn{flex:1}
.approve{border-color:var(--green)} .approve:hover{background:rgba(57,192,127,.15)}
.reject{border-color:var(--red)} .reject:hover{background:rgba(239,95,107,.15)}
.section{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.cand{width:78px;text-align:center;cursor:pointer}
.cand img{width:78px;height:52px;object-fit:cover;border-radius:5px;border:1px solid var(--line)}
.cand.cur img{outline:2px solid var(--green)}
.cand small{color:var(--muted);font-size:9px}
/* ---- timeline ---- */
#timeline{grid-area:timeline;background:var(--track);border-top:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
#tlhead{display:flex;align-items:center;gap:12px;padding:6px 12px;border-bottom:1px solid var(--line);font-size:11px}
#tlhead button{padding:4px 8px}
#ruler{position:relative;height:18px;background:var(--panel);border-bottom:1px solid var(--line);cursor:pointer;font-size:9px;color:var(--muted);overflow:hidden}
#tracks{flex:1;overflow-x:auto;overflow-y:hidden;position:relative}
.track{display:flex;align-items:center;height:70px;position:relative;border-bottom:1px solid var(--line)}
.tracklabel{position:sticky;left:0;z-index:5;width:60px;height:100%;flex:0 0 60px;background:var(--panel);border-right:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)}
.lane{position:relative;height:100%;flex:1}
.vclip{position:absolute;top:6px;height:56px;border-radius:6px;overflow:hidden;border:2px solid transparent;background:#000;cursor:pointer}
.vclip img{width:100%;height:100%;object-fit:cover;opacity:.9}
.vclip.sel{border-color:var(--accent)}
.vclip .lbl{position:absolute;left:0;bottom:0;right:0;font-size:9px;background:rgba(0,0,0,.6);padding:1px 4px;display:flex;justify-content:space-between}
.vclip .st{position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%}
.aclip{position:absolute;top:10px;height:48px;border-radius:6px;background:linear-gradient(180deg,#2a2f6a,#1b1e42);border:1px solid #3a3f7a;overflow:hidden;cursor:pointer;display:flex;align-items:center}
.aclip.sel{border-color:var(--accent)}
.aclip .wave{position:absolute;inset:0;opacity:.5;background:repeating-linear-gradient(90deg,transparent 0 2px,#6a74d8 2px 3px)}
.aclip .atext{position:relative;font-size:9px;color:#cfd3ff;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:2}
#playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);z-index:8;cursor:ew-resize;box-shadow:0 0 6px var(--accent)}
/* wide invisible grab zone so the thin line is easy to catch and drag */
#playhead::after{content:"";position:absolute;top:0;bottom:0;left:-7px;right:-7px}
#playhead::before{content:"";position:absolute;top:-2px;left:-4px;border:5px solid transparent;border-top-color:var(--accent);cursor:ew-resize}
.toast{position:fixed;bottom:220px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--accent);border-radius:8px;padding:8px 14px;z-index:30;font-size:12px}
</style>

<div id="app">
  <div id="health-warn-banner" style="display:none;background:rgba(229,161,58,0.15);border-bottom:1px solid var(--amber);color:var(--amber);padding:6px 16px;font-size:11px;align-items:center;gap:10px">
    <span style="font-size:14px">⚠️</span>
    <span id="health-warn-msg" style="flex:1;font-weight:500"></span>
    <button style="padding:2px 6px;font-size:10px" onclick="dismissBanner()">Dismiss</button>
  </div>
  <div id="head">
    <span class="logo">🎬 Recap Studio</span>
    <span id="health-indicator" style="cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:12px;background:var(--panel2);border:1px solid var(--line)" onclick="setView('logs')">
      <span class="dot" id="health-dot" style="background:var(--green);width:8px;height:8px;border-radius:50%"></span>
      <span id="health-status">System OK</span>
    </span>
    <div id="counts"></div>
    <div class="spacer"></div>
    <button class="ghost" onclick="undo()">↶ Undo</button>
    <button class="ghost" onclick="renderMissing()">Render missing</button>
    <label class="pill"><input type="checkbox" id="x15"/> 1.5×</label>
    <button class="primary" onclick="doExport()">Export approved</button>
  </div>

  <div id="rail">
    <button class="navbtn" data-view="ingest" onclick="setView('ingest')"><span class="ic">🔗</span>Ingest</button>
    <button class="navbtn active" data-view="segments" onclick="setView('segments')"><span class="ic">🎞️</span>Segments</button>
    <button class="navbtn" data-view="scripts" onclick="setView('scripts')"><span class="ic">📝</span>Scripts</button>
    <button class="navbtn" data-view="media" onclick="setView('media')"><span class="ic">🖼️</span>Media</button>
    <button class="navbtn" data-view="export" onclick="setView('export')"><span class="ic">⬆️</span>Export</button>
    <button class="navbtn" data-view="logs" onclick="setView('logs')"><span class="ic">📋</span>Logs</button>
  </div>

  <div id="center">
    <div id="stageWrap"><iframe id="pvframe" src="/api/preview"></iframe></div>
  </div>

  <div id="right"><h3>Details</h3><div id="inspector" class="hint">Select a segment on the timeline.</div></div>

  <div id="timeline">
    <div id="tlhead">
      <button onclick="pvMsg('pv-playpause')">⏯ Play / Pause</button>
      <span id="tlclock" class="muted">0.0s</span>
      <span class="spacer" style="flex:1"></span>
      <span class="hint">Drag video clips to reorder · click a clip to select · click ruler to scrub</span>
    </div>
    <div id="ruler"></div>
    <div id="tracks">
      <div class="track"><div class="tracklabel">VIDEO</div><div class="lane" id="vlane"></div></div>
      <div class="track"><div class="tracklabel">AUDIO</div><div class="lane" id="alane"></div></div>
      <div id="playhead" style="left:60px"></div>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
let DATA=null, sel=0, view='segments', PX=90 /*px per second*/, TOTAL=1, curT=0;

function pvMsg(type,extra){ $('#pvframe').contentWindow.postMessage(Object.assign({type},extra||{}),'*'); }
window.addEventListener('message',e=>{
  const m=e.data||{}; if(m.type!=='pv-time')return;
  curT=m.t; TOTAL=m.total||TOTAL;
  $('#playhead').style.left=(60 + m.t*PX)+'px';
  $('#tlclock').textContent=m.t.toFixed(1)+'s';
});

async function load(){
  DATA=await (await fetch('/api/project')).json();
  TOTAL=DATA.total_duration||1;
  renderCounts(); renderTimeline(); renderRight();
}
function renderCounts(){
  const c=DATA.counts;
  $('#counts').innerHTML=
    `<span class="pill"><span class="dot approved"></span><b>${c.approved}</b></span>
     <span class="pill"><span class="dot rejected"></span><b>${c.rejected}</b></span>
     <span class="pill"><span class="dot pending"></span><b>${c.pending}</b></span>
     <span class="muted">${DATA.n_segments} clips · ${DATA.approved_duration}s approved / ${DATA.total_duration}s</span>`;
}

/* ---------- timeline ---------- */
let dragFrom=null;
function renderTimeline(){
  const total=DATA.total_duration||1;
  // fit-to-width if it would overflow badly: keep min 40px/s, else scale
  const laneW=$('#vlane').clientWidth||900;
  PX=Math.max(40, Math.min(120, laneW/total));
  const fullW=total*PX;
  // ruler ticks every 5s
  let ruler='';
  for(let s=0;s<=total;s+=5) ruler+=`<span style="position:absolute;left:${60+s*PX}px">${s}s</span>
    <span style="position:absolute;left:${60+s*PX}px;top:0;width:1px;height:100%;background:var(--line)"></span>`;
  $('#ruler').innerHTML=ruler; $('#ruler').style.width=(60+fullW)+'px';
  // video lane
  const vl=$('#vlane'); vl.innerHTML=''; vl.style.width=fullW+'px';
  DATA.segments.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='vclip'+(i===sel?' sel':'');
    d.style.left=(s.start*PX)+'px'; d.style.width=Math.max(24,s.dur*PX-2)+'px';
    d.title=s.text;
    d.innerHTML=`<img src="${s.thumb_url}" loading="lazy">
      <span class="st ${s.status}" style="background:var(--${s.status==='approved'?'green':s.status==='rejected'?'red':'muted'})"></span>
      <span class="lbl"><span>#${i+1}</span><span>${s.dur}s</span></span>`;
    d.onclick=()=>{ select(i); pvMsg('pv-seek',{t:s.start}); };
    d.draggable=true;
    d.addEventListener('dragstart',()=>dragFrom=i);
    d.addEventListener('dragover',e=>{e.preventDefault();d.style.outline='2px dashed var(--accent)';});
    d.addEventListener('dragleave',()=>d.style.outline='');
    d.addEventListener('drop',e=>{e.preventDefault();d.style.outline='';dropReorder(dragFrom,i);});
    vl.appendChild(d);
  });
  // audio lane (one block per beat, positioned by global time)
  const al=$('#alane'); al.innerHTML=''; al.style.width=fullW+'px';
  DATA.segments.forEach((s,i)=>s.beats.forEach(b=>{
    if(b.start==null)return;
    const a=document.createElement('div');
    a.className='aclip'+(i===sel?' sel':'');
    a.style.left=(b.start*PX)+'px'; a.style.width=Math.max(18,(b.dur||1)*PX-2)+'px';
    a.title=b.text;
    a.innerHTML=`<div class="wave"></div><span class="atext">🔊 ${b.text}</span>`;
    a.onclick=()=>{ select(i); pvMsg('pv-seek',{t:b.start}); };
    al.appendChild(a);
  }));
  $('#playhead').style.left=(60+curT*PX)+'px';
}
/* click-or-DRAG to scrub: grab the ruler (or the playhead) and drag the line.
   x is measured from the ruler's left edge minus the 60px track-label gutter,
   plus the horizontal scroll of #tracks so it stays aligned when scrolled. */
let scrubbing=false;
function scrubAt(clientX){
  const r=$('#ruler').getBoundingClientRect();
  const x=(clientX-r.left)-60+($('#tracks').scrollLeft||0);
  const t=Math.max(0,Math.min(TOTAL, x/PX));
  curT=t;
  $('#playhead').style.left=(60+t*PX)+'px';
  $('#tlclock').textContent=t.toFixed(1)+'s';
  pvMsg('pv-seek',{t});
}
function startScrub(e){ scrubbing=true; scrubAt(e.clientX); e.preventDefault(); }
$('#ruler').addEventListener('mousedown',startScrub);
$('#playhead').addEventListener('mousedown',startScrub);
document.addEventListener('mousemove',e=>{ if(scrubbing) scrubAt(e.clientX); });
document.addEventListener('mouseup',()=>{ scrubbing=false; });
/* keep the ruler scrolled in lockstep with the tracks so ticks stay aligned */
$('#tracks').addEventListener('scroll',()=>{ $('#ruler').style.transform=`translateX(${-$('#tracks').scrollLeft}px)`; });

/* ---------- right panel (view-dependent) ---------- */
function setView(v){ view=v; document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); renderRight(); }
function renderRight(){
  if(view==='ingest') return renderIngest();
  if(view==='scripts')return renderScripts();
  if(view==='export') return renderExport();
  if(view==='media')  return renderMedia();
  if(view==='logs')   return renderLogs();
  return renderInspector();
}
function renderIngest(){
  $('#right').querySelector('h3').textContent='Ingest a chapter';
  $('#inspector').innerHTML=`
    <div class="hint">Paste a chapter URL — it runs the whole pipeline
      (scrape → split → describe → narrate → voice → match → segment) and opens
      it here. Clips render on demand after.</div>
    <input class="field" id="ingurl" placeholder="https://…/chapter/…" style="margin:10px 0"/>
    <button class="primary" style="width:100%" onclick="runIngest()">▶ Run ingest</button>
    <div id="ingprog" style="margin-top:12px"></div>
    <div class="section"><h3 style="margin:0 0 8px">Projects</h3>
      <div id="projlist" class="hint">loading…</div></div>`;
  paintIngest();                 // restore live progress if a job is running
  if(activeJob()) startIngestPoller();
  loadProjects();
}
const ING_STAGES=['scrape','split','describe','narrate','voice','match','segment'];
// The active ingest job is tracked GLOBALLY and persisted to localStorage, so a
// running job survives switching tabs, reloading, or closing/reopening the page.
// A single poller runs while a job is active regardless of which view is shown;
// it stashes the latest status and repaints the Ingest progress box if visible.
let ingestState=null;           // latest {job,stage,pct,msg,status,error,project}
let ingestPolling=false;
function activeJob(){ return localStorage.getItem('activeIngestJob'); }
function setActiveJob(id){ if(id) localStorage.setItem('activeIngestJob',id); else localStorage.removeItem('activeIngestJob'); }

async function runIngest(){
  const url=$('#ingurl').value.trim(); if(!/^https?:\/\//.test(url)){alert('Paste a full http(s) chapter URL');return;}
  const r=await fetch('/api/ingest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
  const j=await r.json(); if(!r.ok){alert(j.detail||'failed');return;}
  if(j.existing) toast('That chapter is already ingesting — showing that job.');
  setActiveJob(j.job); startIngestPoller();
}
function stageBar(cur,pct,msg,err){
  return `<div style="font-size:12px">${ING_STAGES.map(s=>{
    const done=ING_STAGES.indexOf(s)<ING_STAGES.indexOf(cur), on=s===cur;
    return `<div style="display:flex;align-items:center;gap:6px;margin:2px 0;color:${done?'var(--green)':on?'var(--accent)':'var(--muted)'}">
      <span>${done?'✓':on?'●':'○'}</span>${s}</div>`;}).join('')}</div>
    <div style="height:6px;background:var(--line);border-radius:3px;margin:8px 0;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${err?'var(--red)':'var(--accent)'}"></div></div>
    <div class="hint">${err?('⚠ '+err):msg}</div>`;
}
function paintIngest(){
  const box=$('#ingprog'); if(!box||!ingestState) return;
  const j=ingestState;
  box.innerHTML=stageBar(j.stage,j.pct,j.msg,j.status==='error'?j.error:null);
  if(j.status==='done'&&j.project){ box.innerHTML+=`<button class="primary" style="width:100%;margin-top:8px" onclick="activateProj('${j.project.id}')">Open “${j.project.id}” (${j.project.n_segments} segs)</button>`; }
}
async function startIngestPoller(){
  if(ingestPolling) return; ingestPolling=true;
  try{
    while(activeJob()){
      let j; try{ j=await (await fetch('/api/ingest/status/'+activeJob())).json(); }
      catch(e){ await new Promise(r=>setTimeout(r,2000)); continue; }
      ingestState=j; if(view==='ingest') paintIngest();
      if(j.status==='done'||j.status==='error'){ setActiveJob(null); loadProjects(); break; }
      await new Promise(r=>setTimeout(r,1500));
    }
  } finally { ingestPolling=false; }
}
// resume a job that was running before a tab switch / reload / reopen
if(activeJob()) startIngestPoller();

async function loadProjects(){
  const box=$('#projlist'); if(!box)return;
  const j=await (await fetch('/api/projects')).json();
  let html='';
  if((j.in_progress||[]).length){
    html+='<div class="muted" style="margin:4px 0 4px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px">In Progress</div>'+
      j.in_progress.map(p=>`<div class="row" style="justify-content:space-between;align-items:center;background:var(--panel2);padding:6px 10px;border-radius:6px;margin:4px 0">
        <span style="cursor:pointer;font-size:12px" onclick="watchJob('${p.job}')">⏳ ${p.slug} <span class="muted" style="display:block;font-size:10px">${p.stage} · ${p.pct}%</span></span>
        <button style="padding:2px 8px;font-size:11px" onclick="watchJob('${p.job}')">Watch</button></div>`).join('');
  }
  
  html+='<div class="muted" style="margin:12px 0 6px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px">Series & Chapters</div>';
  
  // Group finished projects by series
  const grouped = {};
  j.projects.forEach(p => {
    const s = p.series || (p.id === "chapter-2 (current)" ? "Default Workspace" : "Other Series");
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(p);
  });
  
  for (const series in grouped) {
    html += `<div style="margin-top:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden">
      <div style="font-weight:600;font-size:12px;color:var(--text);padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line)">📚 ${series}</div>
      <div style="padding:4px 8px">`;
    grouped[series].forEach(p => {
      const label = p.chapter || (p.id === "chapter-2 (current)" ? "Chapter 2" : p.id);
      html += `<div class="row" style="justify-content:space-between;align-items:center;margin:4px 0;padding:4px">
        <span style="font-size:12px">${p.active?'▶ ':''}${label} <span class="hint">(${p.n_segments} segs${p.duration ? ' · ' + p.duration + 's' : ''})</span></span>
        ${p.active?'<span class="muted" style="font-size:11px;padding:2px 6px">active</span>':`<button style="padding:2px 6px;font-size:11px" onclick="activateProj('${p.id}')">Open</button>`}
      </div>`;
    });
    html += `</div></div>`;
  }
  box.innerHTML=html;
}
function watchJob(job){ setActiveJob(job); setView('ingest'); startIngestPoller(); }

function renderLogs(){
  $('#right').querySelector('h3').textContent='Logs';
  $('#inspector').innerHTML=`
    <div class="hint">Live job history + every external API call (cost-tracked). Survives restarts.</div>
    <button style="width:100%;margin:8px 0" onclick="loadLogs()">↻ Refresh</button>
    <div class="section"><h3 style="margin:0 0 6px">Ingest jobs</h3><div id="logjobs" class="hint">loading…</div></div>
    <div class="section"><h3 style="margin:0 0 6px">API usage (today)</h3><div id="logusage" class="hint">loading…</div></div>`;
  loadLogs();
}
async function loadLogs(){
  try{
    const ij=await (await fetch('/api/logs/ingest')).json();
    $('#logjobs').innerHTML=(ij.jobs||[]).slice(0,20).map(j=>{
      const col=j.status==='done'?'var(--green)':j.status==='error'?'var(--red)':'var(--accent)';
      return `<div style="border-bottom:1px solid var(--line);padding:4px 0;font-size:12px">
        <div style="color:${col}">${j.status} · ${j.stage||''} ${j.pct?('· '+j.pct+'%'):''}</div>
        <div class="muted" style="word-break:break-all">${(j.url||'').replace('https://','')}</div>
        ${j.error?`<div style="color:var(--red)">⚠ ${j.error}</div>`:''}</div>`;
    }).join('')||'<span class=muted>No jobs yet.</span>';
    const uj=await (await fetch('/api/logs/usage?n=60')).json();
    const s=uj.summary||{};
    $('#logusage').innerHTML=`<div style="font-size:12px;margin-bottom:6px">
      <b>${s.gemini_calls||0}</b> Gemini calls · <b>${(s.tts_chars||0).toLocaleString()}</b> TTS chars ·
      est <b>$${(s.est_cost_usd||0).toFixed(3)}</b> today (${s.date||''})</div>`+
      (uj.calls||[]).slice(0,40).map(c=>`<div class="muted" style="font-size:11px;border-bottom:1px solid var(--line);padding:2px 0">
        ${c.kind||c.provider||'?'} · ${c.units||c.tokens||c.chars||''} · $${(c.est_cost_usd||c.cost||0).toFixed?(c.est_cost_usd||c.cost||0).toFixed(4):0} <span style="opacity:.6">${(c.job||'').slice(0,8)}</span></div>`).join('');
  }catch(e){ $('#logjobs').innerHTML='<span class=muted>Failed to load logs.</span>'; }
}
async function activateProj(id){
  const r=await fetch('/api/activate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
  if(!r.ok){alert('activate failed');return;}
  setView('segments'); sel=0; await load(); reloadPreview();
}
function select(i){ sel=i; document.querySelectorAll('.vclip').forEach((c,ci)=>c.classList.toggle('sel',ci===i));
  document.querySelectorAll('.aclip').forEach(c=>c.classList.remove('sel')); renderRight(); }

function renderInspector(){
  $('#right').querySelector('h3').textContent='Details';
  const s=DATA.segments[sel]; if(!s){ $('#inspector').innerHTML='<div class=hint>No segment.</div>'; return; }
  $('#inspector').innerHTML=`
    <img class="insp-img" src="${s.thumb_url}">
    <div class="muted">#${sel+1} · ${s.panel_id}</div>
    <div class="muted" style="font-size:11px">${s.n_beats} beat(s) · ${s.dur}s · ${s.start}s→${s.end}s</div>
    <div class="row"><span class="dot ${s.status}"></span><b style="text-transform:capitalize">${s.status}</b></div>
    <h3 style="margin:8px 0 4px">Narration ${s.n_beats>1?`(${s.n_beats} lines)`:''}</h3>
    ${s.beats.map(b=>beatEditor(s.seg_index,b,'dt')).join('')}
    <div class="row" style="margin-top:10px">
      <button class="seg-btn approve" onclick="setStatus('approved')">✓ Approve</button>
      <button class="seg-btn reject" onclick="setStatus('rejected')">✕ Reject</button>
    </div>
    <button style="width:100%" onclick="setStatus('pending')">Reset to pending</button>
    <div class="section"><h3 style="margin:0 0 8px">Structure</h3>
      <div class="row">
        ${s.n_beats>1?`<button onclick="splitSeg(${s.seg_index})">✂ Split (${s.n_beats})</button>`:''}
        ${sel<DATA.segments.length-1?`<button onclick="mergeNext(${s.seg_index})">⇥ Merge next</button>`:''}
      </div></div>
    <div class="section"><h3 style="margin:0 0 8px">Swap panel</h3>
      <div id="cands" class="hint">loading…</div></div>`;
  loadCands(s.seg_index);
}
async function loadCands(i){
  const box=$('#cands'); if(!box)return;
  const j=await (await fetch(`/api/segments/${i}/candidates?k=8`)).json();
  box.innerHTML='<div class="row">'+j.candidates.map(c=>`
    <div class="cand ${c.current?'cur':''}" title="${(c.desc||'').replace(/"/g,'&quot;')}" onclick="swapPanel(${i},'${c.panel_id}')">
      <img src="${c.thumb_url}"><small>${c.current?'current':c.score}</small></div>`).join('')+'</div>';
}
async function renderMedia(){
  $('#right').querySelector('h3').textContent='Media — panel library';
  $('#inspector').innerHTML='<div class="hint">loading chapter panels…</div>';
  try{
    const j=await (await fetch('/api/media')).json();
    $('#inspector').innerHTML=
      `<div class="hint">${j.count} panels in this chapter · ${j.used} used on the timeline.
        Click a panel to swap it into the selected clip (#${sel+1}).</div>
       <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px">`+
      j.panels.map(p=>`<div class="cand ${p.used?'cur':''}" style="width:100%"
        title="${(p.desc||'').replace(/"/g,'&quot;')}"
        onclick="swapPanel(DATA.segments[sel].seg_index,'${p.panel_id}')">
        <img src="${p.thumb_url}" style="width:100%;height:70px;object-fit:cover;border-radius:5px;border:1px solid var(--line)">
        <small style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.panel_id}${p.used?' ✓':''}</small>
      </div>`).join('')+'</div>';
  }catch(e){ $('#inspector').innerHTML='<div class="hint">Failed to load media.</div>'; }
}

/* ---------- per-line narration editing (shared by Details + Scripts) ---------- */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(x){ x=x||0; const m=Math.floor(x/60), s=(x%60); return m+':'+(s<10?'0':'')+s.toFixed(1); }
function beatEditor(segIndex,b,ctx){
  const id=`${ctx}_${segIndex}_${b.index}`;
  return `<div style="border-top:1px solid var(--line);padding-top:6px;margin-top:6px">
    <div class="muted" style="font-size:10px">line · ${fmtTime(b.start)} · ${b.dur||'?'}s</div>
    <textarea class="field" id="ta_${id}" rows="2" style="margin-top:3px">${esc(b.text)}</textarea>
    <div class="row" style="margin:4px 0;align-items:center">
      <button onclick="saveBeat(${segIndex},${b.index},'ta_${id}','st_${id}')">💬 Save → re-TTS</button>
      <span id="st_${id}" style="font-size:10px" class="muted"></span>
    </div></div>`;
}
async function saveBeat(segIndex,beatIndex,taId,stId){
  const ta=document.getElementById(taId), st=document.getElementById(stId);
  const txt=(ta.value||'').trim(); if(!txt) return;
  const setSt=(m,c)=>{ if(st){st.textContent=m;st.style.color=c||'var(--muted)';} };
  setSt('⏳ re-synthesizing…','var(--amber)');
  let j;
  try{
    const r=await fetch(`/api/segments/${segIndex}/narration`,{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({beats:[{index:beatIndex,text:txt}]})});
    j=await r.json(); if(!r.ok){ setSt('⚠ '+(j.detail||'failed'),'var(--red)'); return; }
  }catch(e){ setSt('⚠ network error','var(--red)'); return; }
  if(j.job){ setSt('⏳ re-rendering clip…','var(--amber)');
    while(true){ const p=await (await fetch('/api/jobs/'+j.job)).json();
      if(p.status==='done') break;
      if(p.status==='error'){ setSt('⚠ '+p.error,'var(--red)'); return; }
      await new Promise(r=>setTimeout(r,1200)); } }
  setSt('✓ saved','var(--green)');
  const keep=view; await load(); reloadPreview();
  if(view!==keep){ view=keep; renderRight(); }
}
/* move preview + timeline playhead to a spot WITHOUT changing the right panel */
function jumpTo(i,t){ sel=i;
  document.querySelectorAll('.vclip').forEach((c,ci)=>c.classList.toggle('sel',ci===i));
  curT=t; $('#playhead').style.left=(60+t*PX)+'px'; $('#tlclock').textContent=(t||0).toFixed(1)+'s';
  pvMsg('pv-seek',{t}); }

function renderScripts(){
  $('#right').querySelector('h3').textContent='Scripts — full narration';
  if(!DATA||!DATA.segments.length){ $('#inspector').innerHTML='<div class="hint">No chapter loaded.</div>'; return; }
  const full=DATA.segments.map(s=>s.beats.map(b=>b.text).join(' ')).join('\n\n');
  let rows='';
  DATA.segments.forEach((s,i)=>s.beats.forEach(b=>{
    const id=`sc_${s.seg_index}_${b.index}`;
    rows+=`<div style="display:flex;gap:8px;border-bottom:1px solid var(--line);padding:8px 0">
      <img src="${s.thumb_url}" onclick="jumpTo(${i},${b.start||s.start})" loading="lazy"
        style="width:54px;height:36px;object-fit:cover;border-radius:4px;border:1px solid var(--line);cursor:pointer;flex:0 0 auto"
        title="jump to this line">
      <div style="flex:1;min-width:0">
        <div class="muted" style="font-size:10px;cursor:pointer" onclick="jumpTo(${i},${b.start||s.start})">#${i+1} · ${s.panel_id} · ${fmtTime(b.start)}</div>
        <textarea class="field" id="ta_${id}" rows="2" style="margin-top:3px">${esc(b.text)}</textarea>
        <div class="row" style="margin:3px 0;align-items:center">
          <button onclick="saveBeat(${s.seg_index},${b.index},'ta_${id}','st_${id}')">💬 Save → re-TTS</button>
          <span id="st_${id}" style="font-size:10px" class="muted"></span>
        </div>
      </div></div>`;
  }));
  $('#inspector').innerHTML=
    `<div class="hint">Every narration line in order. Edit inline and Save → re-synthesizes just that line and preserves the rest. Click a thumbnail to jump the player there.</div>
     <details style="margin:8px 0"><summary class="muted" style="cursor:pointer;font-size:11px">📄 Whole script (read-only)</summary>
       <textarea class="field" readonly rows="8" style="margin-top:6px;font-size:11px">${esc(full)}</textarea></details>
     ${rows}`;
}
function renderExport(){
  $('#right').querySelector('h3').textContent='Export';
  $('#inspector').innerHTML=`
    <div class="muted">${DATA.counts.approved} approved · ${DATA.approved_duration}s</div>
    <label class="row"><input type="checkbox" id="x15b"/> Apply 1.5× speed</label>
    <button class="primary" style="width:100%" onclick="doExport(true)">⬆️ Export approved clips</button>
    <div class="section"><button style="width:100%" onclick="renderMissing()">Render missing clips</button></div>
    <div id="exresult" class="hint" style="margin-top:10px"></div>`;
}

/* ---------- actions (all existing endpoints) ---------- */
function toast(msg){ const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);
  return t; }
async function pollJob(job,label){
  if(!job)return; const t=toast(label+' — rendering…');
  while(true){ const j=await (await fetch('/api/jobs/'+job)).json();
    if(j.status==='done'){t.remove();reloadPreview();await load();return;}
    if(j.status==='error'){t.textContent='⚠ '+j.error;setTimeout(()=>t.remove(),4000);return;}
    await new Promise(r=>setTimeout(r,1500)); } }
function reloadPreview(){ $('#pvframe').src='/api/preview?'+Date.now(); }

async function setStatus(st){ const s=DATA.segments[sel];
  await fetch(`/api/segments/${s.seg_index}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:st})});
  await load(); }
async function saveNarr(i){ const txt=$('#narr').value.trim(); const s=DATA.segments.find(x=>x.seg_index===i);
  if(!txt||txt===s.text)return;
  const r=await fetch(`/api/segments/${i}/narration`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({beats:[{index:s.beats[0].index,text:txt}]})});
  const j=await r.json(); if(!r.ok){toast('⚠ '+j.detail);return;} await load(); pollJob(j.job,'Narration'); }
async function swapPanel(i,pid){ const r=await fetch(`/api/segments/${i}/panel`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({panel_id:pid})});
  const j=await r.json(); if(!r.ok){toast('⚠ '+j.detail);return;} await load(); pollJob(j.job,'Panel swap'); }
async function splitSeg(i){ if(!confirm('Split after the first beat? Both halves re-render.'))return;
  const r=await fetch(`/api/segments/${i}/split`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({after:0})});
  const j=await r.json(); if(!r.ok){toast('⚠ '+j.detail);return;} await load(); pollJob(j.job,'Split'); }
async function mergeNext(i){ const pos=DATA.segments.findIndex(x=>x.seg_index===i); const nx=DATA.segments[pos+1];
  if(!nx||!confirm('Merge next clip into this one?'))return;
  const r=await fetch('/api/segments/merge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({a:i,b:nx.seg_index})});
  const j=await r.json(); if(!r.ok){toast('⚠ '+j.detail);return;} sel=pos; await load(); pollJob(j.job,'Merge'); }
async function dropReorder(from,to){ if(from==null||from===to)return;
  const order=DATA.segments.map(s=>s.seg_index); const [m]=order.splice(from,1); order.splice(to,0,m);
  await fetch('/api/segments/reorder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order})});
  sel=to; await load(); reloadPreview(); }
async function undo(){ const r=await fetch('/api/undo',{method:'POST'}); if(!r.ok){toast('nothing to undo');return;} await load(); reloadPreview(); }
async function renderMissing(){ const t=toast('Rendering missing clips…');
  const r=await fetch('/api/render-missing',{method:'POST'}); const j=await r.json(); t.remove(); toast(`Rendered ${j.rendered} clip(s)`); setTimeout(()=>document.querySelector('.toast')?.remove(),2500); await load(); reloadPreview(); }
async function doExport(fromPanel){ const x15=(fromPanel&&$('#x15b'))?$('#x15b').checked:$('#x15').checked;
  const t=toast('Exporting approved clips…');
  const r=await fetch('/api/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({speed:x15?1.5:1})});
  const j=await r.json(); t.remove();
  if(!r.ok){toast('⚠ '+(j.detail||'export failed'));return;}
  const link=`/export/${j.output}`;
  const box=$('#exresult'); const msg=`✓ Exported ${j.clips} clips → <a href="${link}" style="color:var(--accent)" download>${j.output}</a>`;
  if(box)box.innerHTML=msg; else { const tt=toast('');tt.innerHTML=msg;setTimeout(()=>tt.remove(),8000);} }

let bannerDismissed = false;
function dismissBanner() {
  $('#health-warn-banner').style.display = 'none';
  bannerDismissed = true;
}

async function checkHealth(){
  if (document.hidden) return;
  try {
    const r = await fetch('/api/health');
    if (!r.ok) throw new Error();
    const h = await r.json();
    const dot = $('#health-dot');
    const txt = $('#health-status');
    
    if (h.status === 'OK') {
      dot.style.background = 'var(--green)';
      txt.textContent = 'System OK';
      dot.style.boxShadow = 'none';
    } else if (h.status === 'WARNING') {
      dot.style.background = 'var(--amber)';
      txt.textContent = 'Warning';
      dot.style.boxShadow = '0 0 6px var(--amber)';
    } else {
      dot.style.background = 'var(--red)';
      txt.textContent = 'Critical';
      dot.style.boxShadow = '0 0 8px var(--red)';
    }
    
    const banner = $('#health-warn-banner');
    if (h.caps.warnings.length > 0 && !bannerDismissed) {
      $('#health-warn-msg').textContent = h.caps.warnings.join(' | ');
      banner.style.display = 'flex';
      if (h.status === 'CRITICAL') {
        banner.style.background = 'rgba(239,95,107,0.15)';
        banner.style.borderBottom = '1px solid var(--red)';
        banner.style.color = 'var(--red)';
      } else {
        banner.style.background = 'rgba(229,161,58,0.15)';
        banner.style.borderBottom = '1px solid var(--amber)';
        banner.style.color = 'var(--amber)';
      }
    } else if (h.caps.warnings.length === 0) {
      banner.style.display = 'none';
      bannerDismissed = false; // Reset dismissal when health goes green
    }
  } catch (e) {
    $('#health-dot').style.background = 'var(--muted)';
    $('#health-status').textContent = 'Offline';
  }
}
setInterval(checkHealth, 10000);
checkHealth();

window.addEventListener('resize',()=>{ if(DATA)renderTimeline(); });
load();
</script>
