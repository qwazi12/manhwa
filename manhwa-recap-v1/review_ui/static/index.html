<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Recap Studio</title>
<style>
:root{
  --bg:#0d0e12; --panel:#15171e; --panel2:#1b1e27; --line:#282c38;
  --text:#e6e8ef; --muted:#8b90a0; --accent:#5b8cff; --accent2:#7c5cff;
  --green:#39c07f; --red:#ef5f6b; --amber:#e5a13a; --track:#101219;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font:13px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden}
button{font:inherit;cursor:pointer;color:var(--text);background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:6px 10px}
button:hover{border-color:var(--accent)}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.ghost{background:transparent}
.muted{color:var(--muted)} .hint{color:var(--muted);font-size:11px}
/* ---- shell grid ---- */
#app{display:grid;height:100vh;
  grid-template-columns:66px 1fr 322px;
  grid-template-rows:50px 1fr 208px;
  grid-template-areas:"head head head" "rail center right" "rail timeline timeline";}
#head{grid-area:head;display:flex;align-items:center;gap:14px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--line)}
#head .logo{font-weight:700;letter-spacing:.3px}
#head .spacer{flex:1}
#counts{display:flex;gap:10px;align-items:center;font-size:12px}
#counts b{font-variant-numeric:tabular-nums}
.pill{display:inline-flex;gap:5px;align-items:center;padding:3px 8px;border-radius:20px;background:var(--panel2);border:1px solid var(--line)}
.dot{width:8px;height:8px;border-radius:50%}
.dot.approved{background:var(--green)} .dot.rejected{background:var(--red)} .dot.pending{background:var(--muted)}
/* ---- left rail ---- */
#rail{grid-area:rail;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:12px}
.navbtn{width:52px;height:56px;border:0;background:transparent;border-radius:9px;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;color:var(--muted);font-size:10px}
.navbtn .ic{font-size:19px;line-height:1}
.navbtn:hover{background:var(--panel2);color:var(--text)}
.navbtn.active{background:var(--panel2);color:var(--accent)}
/* ---- center ---- */
#center{grid-area:center;display:flex;flex-direction:column;background:#07080b;min-width:0}
#stageWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:14px;min-height:0}
#pvframe{width:100%;height:100%;border:0;border-radius:10px;background:#000;box-shadow:0 10px 40px rgba(0,0,0,.5)}
/* ---- right ---- */
#right{grid-area:right;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:14px}
#right h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
.insp-img{width:100%;border-radius:8px;border:1px solid var(--line);background:#000;display:block;margin-bottom:8px;max-height:190px;object-fit:contain}
.row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.field{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--text);padding:8px;resize:vertical;font:inherit}
.seg-btn{flex:1}
.approve{border-color:var(--green)} .approve:hover{background:rgba(57,192,127,.15)}
.reject{border-color:var(--red)} .reject:hover{background:rgba(239,95,107,.15)}
.section{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.cand{width:78px;text-align:center;cursor:pointer}
.cand img{width:78px;height:52px;object-fit:cover;border-radius:5px;border:1px solid var(--line)}
.cand.cur img{outline:2px solid var(--green)}
.cand small{color:var(--muted);font-size:9px}
/* ---- timeline ---- */
#timeline{grid-area:timeline;background:var(--track);border-top:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
#tlhead{display:flex;align-items:center;gap:12px;padding:6px 12px;border-bottom:1px solid var(--line);font-size:11px}
#tlhead button{padding:4px 8px}
#ruler{position:relative;height:18px;background:var(--panel);border-bottom:1px solid var(--line);cursor:pointer;font-size:9px;color:var(--muted);overflow:hidden}
#tracks{flex:1;overflow-x:auto;overflow-y:hidden;position:relative}
.track{display:flex;align-items:center;height:70px;position:relative;border-bottom:1px solid var(--line)}
.tracklabel{position:sticky;left:0;z-index:5;width:60px;height:100%;flex:0 0 60px;background:var(--panel);border-right:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)}
.lane{position:relative;height:100%;flex:1}
.vclip{position:absolute;top:6px;height:56px;border-radius:6px;overflow:hidden;border:2px solid transparent;background:#000;cursor:pointer}
.vclip img{width:100%;height:100%;object-fit:cover;opacity:.9}
.vclip.sel{border-color:var(--accent)}
.vclip .lbl{position:absolute;left:0;bottom:0;right:0;font-size:9px;background:rgba(0,0,0,.6);padding:1px 4px;display:flex;justify-content:space-between}
.vclip .st{position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%}
.aclip{position:absolute;top:10px;height:48px;border-radius:6px;background:linear-gradient(180deg,#2a2f6a,#1b1e42);border:1px solid #3a3f7a;overflow:hidden;cursor:pointer;display:flex;align-items:center}
.aclip.sel{border-color:var(--accent)}
.aclip .wave{position:absolute;inset:0;opacity:.5;background:repeating-linear-gradient(90deg,transparent 0 2px,#6a74d8 2px 3px)}
.aclip .atext{position:relative;font-size:9px;color:#cfd3ff;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:2}
#playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);z-index:8;pointer-events:none;box-shadow:0 0 6px var(--accent)}
#playhead::before{content:"";position:absolute;top:-2px;left:-4px;border:5px solid transparent;border-top-color:var(--accent)}
.toast{position:fixed;bottom:220px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--accent);border-radius:8px;padding:8px 14px;z-index:30;font-size:12px}
</style>

<div id="app">
  <div id="head">
    <span class="logo">🎬 Recap Studio</span>
    <div id="counts"></div>
    <div class="spacer"></div>
    <button class="ghost" onclick="undo()">↶ Undo</button>
    <button class="ghost" onclick="renderMissing()">Render missing</button>
    <label class="pill"><input type="checkbox" id="x15"/> 1.5×</label>
    <button class="primary" onclick="doExport()">Export approved</button>
  </div>

  <div id="rail">
    <button class="navbtn active" data-view="segments" onclick="setView('segments')"><span class="ic">🎞️</span>Segments</button>
    <button class="navbtn" data-view="media" onclick="setView('media')"><span class="ic">🖼️</span>Media</button>
    <button class="navbtn" data-view="export" onclick="setView('export')"><span class="ic">⬆️</span>Export</button>
  </div>

  <div id="center">
    <div id="stageWrap"><iframe id="pvframe" src="/api/preview"></iframe></div>
  </div>

  <div id="right"><h3>Details</h3><div id="inspector" class="hint">Select a segment on the timeline.</div></div>

  <div id="timeline">
    <div id="tlhead">
      <button onclick="pvMsg('pv-playpause')">⏯ Play / Pause</button>
      <span id="tlclock" class="muted">0.0s</span>
      <span class="spacer" style="flex:1"></span>
      <span class="hint">Drag video clips to reorder · click a clip to select · click ruler to scrub</span>
    </div>
    <div id="ruler"></div>
    <div id="tracks">
      <div class="track"><div class="tracklabel">VIDEO</div><div class="lane" id="vlane"></div></div>
      <div class="track"><div class="tracklabel">AUDIO</div><div class="lane" id="alane"></div></div>
      <div id="playhead" style="left:60px"></div>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
let DATA=null, sel=0, view='segments', PX=90 /*px per second*/, TOTAL=1, curT=0;

function pvMsg(type,extra){ $('#pvframe').contentWindow.postMessage(Object.assign({type},extra||{}),'*'); }
window.addEventListener('message',e=>{
  const m=e.data||{}; if(m.type!=='pv-time')return;
  curT=m.t; TOTAL=m.total||TOTAL;
  $('#playhead').style.left=(60 + m.t*PX)+'px';
  $('#tlclock').textContent=m.t.toFixed(1)+'s';
});

async function load(){
  DATA=await (await fetch('/api/project')).json();
  TOTAL=DATA.total_duration||1;
  renderCounts(); renderTimeline(); renderRight();
}
function renderCounts(){
  const c=DATA.counts;
  $('#counts').innerHTML=
    `<span class="pill"><span class="dot approved"></span><b>${c.approved}</b></span>
     <span class="pill"><span class="dot rejected"></span><b>${c.rejected}</b></span>
     <span class="pill"><span class="dot pending"></span><b>${c.pending}</b></span>
     <span class="muted">${DATA.n_segments} clips · ${DATA.approved_duration}s approved / ${DATA.total_duration}s</span>`;
}

/* ---------- timeline ---------- */
let dragFrom=null;
function renderTimeline(){
  const total=DATA.total_duration||1;
  // fit-to-width if it would overflow badly: keep min 40px/s, else scale
  const laneW=$('#vlane').clientWidth||900;
  PX=Math.max(40, Math.min(120, laneW/total));
  const fullW=total*PX;
  // ruler ticks every 5s
  let ruler='';
  for(let s=0;s<=total;s+=5) ruler+=`<span style="position:absolute;left:${60+s*PX}px">${s}s</span>
    <span style="position:absolute;left:${60+s*PX}px;top:0;width:1px;height:100%;background:var(--line)"></span>`;
  $('#ruler').innerHTML=ruler; $('#ruler').style.width=(60+fullW)+'px';
  // video lane
  const vl=$('#vlane'); vl.innerHTML=''; vl.style.width=fullW+'px';
  DATA.segments.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='vclip'+(i===sel?' sel':'');
    d.style.left=(s.start*PX)+'px'; d.style.width=Math.max(24,s.dur*PX-2)+'px';
    d.title=s.text;
    d.innerHTML=`<img src="${s.thumb_url}" loading="lazy">
      <span class="st ${s.status}" style="background:var(--${s.status==='approved'?'green':s.status==='rejected'?'red':'muted'})"></span>
      <span class="lbl"><span>#${i+1}</span><span>${s.dur}s</span></span>`;
    d.onclick=()=>{ select(i); pvMsg('pv-seek',{t:s.start}); };
    d.draggable=true;
    d.addEventListener('dragstart',()=>dragFrom=i);
    d.addEventListener('dragover',e=>{e.preventDefault();d.style.outline='2px dashed var(--accent)';});
    d.addEventListener('dragleave',()=>d.style.outline='');
    d.addEventListener('drop',e=>{e.preventDefault();d.style.outline='';dropReorder(dragFrom,i);});
    vl.appendChild(d);
  });
  // audio lane (one block per beat, positioned by global time)
  const al=$('#alane'); al.innerHTML=''; al.style.width=fullW+'px';
  DATA.segments.forEach((s,i)=>s.beats.forEach(b=>{
    if(b.start==null)return;
    const a=document.createElement('div');
    a.className='aclip'+(i===sel?' sel':'');
    a.style.left=(b.start*PX)+'px'; a.style.width=Math.max(18,(b.dur||1)*PX-2)+'px';
    a.title=b.text;
    a.innerHTML=`<div class="wave"></div><span class="atext">🔊 ${b.text}</span>`;
    a.onclick=()=>{ select(i); pvMsg('pv-seek',{t:b.start}); };
    al.appendChild(a);
  }));
  $('#playhead').style.left=(60+curT*PX)+'px';
}
$('#ruler').addEventListener('click',e=>{
  const x=e.offsetX-0; const t=Math.max(0,x/PX); pvMsg('pv-seek',{t});
});

/* ---------- right panel (view-dependent) ---------- */
function setView(v){ view=v; document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); renderRight(); }
function renderRight(){
  if(view==='export') return renderExport();
  if(view==='media')  return renderMedia();
  return renderInspector();
}
function select(i){ sel=i; document.querySelectorAll('.vclip').forEach((c,ci)=>c.classList.toggle('sel',ci===i));
  document.querySelectorAll('.aclip').forEach(c=>c.classList.remove('sel')); renderRight(); }

function renderInspector(){
  $('#right').querySelector('h3').textContent='Details';
  const s=DATA.segments[sel]; if(!s){ $('#inspector').innerHTML='<div class=hint>No segment.</div>'; return; }
  $('#inspector').innerHTML=`
    <img class="insp-img" src="${s.thumb_url}">
    <div class="muted">#${sel+1} · ${s.panel_id}</div>
    <div class="muted" style="font-size:11px">${s.n_beats} beat(s) · ${s.dur}s · ${s.start}s→${s.end}s</div>
    <div class="row"><span class="dot ${s.status}"></span><b style="text-transform:capitalize">${s.status}</b></div>
    <textarea class="field" id="narr" rows="4">${s.text||''}</textarea>
    <button style="width:100%;margin-top:6px" onclick="saveNarr(${s.seg_index})">💬 Save narration → re-TTS</button>
    <div class="row">
      <button class="seg-btn approve" onclick="setStatus('approved')">✓ Approve</button>
      <button class="seg-btn reject" onclick="setStatus('rejected')">✕ Reject</button>
    </div>
    <button style="width:100%" onclick="setStatus('pending')">Reset to pending</button>
    <div class="section"><h3 style="margin:0 0 8px">Structure</h3>
      <div class="row">
        ${s.n_beats>1?`<button onclick="splitSeg(${s.seg_index})">✂ Split (${s.n_beats})</button>`:''}
        ${sel<DATA.segments.length-1?`<button onclick="mergeNext(${s.seg_index})">⇥ Merge next</button>`:''}
      </div></div>
    <div class="section"><h3 style="margin:0 0 8px">Swap panel</h3>
      <div id="cands" class="hint">loading…</div></div>`;
  loadCands(s.seg_index);
}
async function loadCands(i){
  const box=$('#cands'); if(!box)return;
  const j=await (await fetch(`/api/segments/${i}/candidates?k=8`)).json();
  box.innerHTML='<div class="row">'+j.candidates.map(c=>`
    <div class="cand ${c.current?'cur':''}" title="${(c.desc||'').replace(/"/g,'&quot;')}" onclick="swapPanel(${i},'${c.panel_id}')">
      <img src="${c.thumb_url}"><small>${c.current?'current':c.score}</small></div>`).join('')+'</div>';
}
function renderMedia(){
  $('#right').querySelector('h3').textContent='Media — panel library';
  const s=DATA.segments[sel];
  $('#inspector').innerHTML=`<div class="hint">Pick a replacement panel for selected clip #${sel+1}.</div><div id="cands" class="hint">loading…</div>`;
  loadCands(s.seg_index);
}
function renderExport(){
  $('#right').querySelector('h3').textContent='Export';
  $('#inspector').innerHTML=`
    <div class="muted">${DATA.counts.approved} approved · ${DATA.approved_duration}s</div>
    <label class="row"><input type="checkbox" id="x15b"/> Apply 1.5× speed</label>
    <button class="primary" style="width:100%" onclick="doExport(true)">⬆️ Export approved clips</button>
    <div class="section"><button style="width:100%" onclick="renderMissing()">Render missing clips</button></div>
    <div id="exresult" class="hint" style="margin-top:10px"></div>`;
}

/* ---------- actions (all existing endpoints) ---------- */
function toast(msg){ const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);
  return t; }
async function pollJob(job,label){
  if(!job)return; const t=toast(label+' — rendering…');
  while(true){ const j=await (await fetch('/api/jobs/'+job)).json();
    if(j.status==='done'){t.remove();reloadPreview();await load();return;}
    if(j.status==='error'){t.textContent='⚠ '+j.error;setTimeout(()=>t.remove(),4000);return;}
    await new Promise(r=>setTimeout(r,1500)); } }
function reloadPreview(){ $('#pvframe').src='/api/preview?'+Date.now(); }

async function setStatus(st){ const s=DATA.segments[sel];
  await fetch(`/api/segments/${s.seg_index}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:st})});
  await load(); }
async function saveNarr(i){ const txt=$('#narr').value.trim(); const s=DATA.segments.find(x=>x.seg_index===i);
  if(!txt||txt===s.text)return;
  const r=await fetch(`/api/segments/${i}/narration`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({beats:[{index:s.beats[0].index,text:txt}]})});
  const j=await r.json(); if(!r.ok){toast('⚠ '+j.detail);return;} await load(); pollJob(j.job,'Narration'); }
async function swapPanel(i,pid){ const r=await fetch(`/api/segments/${i}/panel`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({panel_id:pid})});
  const j=await r.json(); if(!r.ok){toast('⚠ '+j.detail);return;} await load(); pollJob(j.job,'Panel swap'); }
async function splitSeg(i){ if(!confirm('Split after the first beat? Both halves re-render.'))return;
  const r=await fetch(`/api/segments/${i}/split`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({after:0})});
  const j=await r.json(); if(!r.ok){toast('⚠ '+j.detail);return;} await load(); pollJob(j.job,'Split'); }
async function mergeNext(i){ const pos=DATA.segments.findIndex(x=>x.seg_index===i); const nx=DATA.segments[pos+1];
  if(!nx||!confirm('Merge next clip into this one?'))return;
  const r=await fetch('/api/segments/merge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({a:i,b:nx.seg_index})});
  const j=await r.json(); if(!r.ok){toast('⚠ '+j.detail);return;} sel=pos; await load(); pollJob(j.job,'Merge'); }
async function dropReorder(from,to){ if(from==null||from===to)return;
  const order=DATA.segments.map(s=>s.seg_index); const [m]=order.splice(from,1); order.splice(to,0,m);
  await fetch('/api/segments/reorder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order})});
  sel=to; await load(); reloadPreview(); }
async function undo(){ const r=await fetch('/api/undo',{method:'POST'}); if(!r.ok){toast('nothing to undo');return;} await load(); reloadPreview(); }
async function renderMissing(){ const t=toast('Rendering missing clips…');
  const r=await fetch('/api/render-missing',{method:'POST'}); const j=await r.json(); t.remove(); toast(`Rendered ${j.rendered} clip(s)`); setTimeout(()=>document.querySelector('.toast')?.remove(),2500); await load(); reloadPreview(); }
async function doExport(fromPanel){ const x15=(fromPanel&&$('#x15b'))?$('#x15b').checked:$('#x15').checked;
  const t=toast('Exporting approved clips…');
  const r=await fetch('/api/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({speed:x15?1.5:1})});
  const j=await r.json(); t.remove();
  if(!r.ok){toast('⚠ '+(j.detail||'export failed'));return;}
  const link=`/export/${j.output}`;
  const box=$('#exresult'); const msg=`✓ Exported ${j.clips} clips → <a href="${link}" style="color:var(--accent)" download>${j.output}</a>`;
  if(box)box.innerHTML=msg; else { const tt=toast('');tt.innerHTML=msg;setTimeout(()=>tt.remove(),8000);} }

window.addEventListener('resize',()=>{ if(DATA)renderTimeline(); });
load();
</script>
